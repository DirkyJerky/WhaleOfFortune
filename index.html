<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Whale of Fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    /* Hide scrollbar for a cleaner mobile look but allow scrolling */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
  </style>
</head>

<body
  class="bg-base-300 min-h-[100dvh] flex flex-col items-center relative overflow-x-hidden text-base-content selection:bg-primary selection:text-primary-content transition-opacity duration-50 ease-in-out">

  <!-- Premium Background Effects -->
  <div
    class="fixed top-[-10%] left-[-20%] w-[80%] h-[60%] bg-primary/20 rounded-[100%] blur-[120px] -z-10 pointer-events-none">
  </div>
  <div
    class="fixed bottom-[-10%] right-[-20%] w-[80%] h-[60%] bg-secondary/20 rounded-[100%] blur-[120px] -z-10 pointer-events-none">
  </div>
  <div
    class="fixed top-[40%] left-[50%] translate-x-[-50%] w-[100%] h-[40%] bg-accent/10 rounded-[100%] blur-[100px] -z-10 pointer-events-none">
  </div>

  <main class="w-full max-w-md flex flex-col px-6 py-10 z-10 gap-4 h-full">

    <!-- Header Section -->
    <header class="text-center space-y-2">
      <h1
        class="text-5xl font-extrabold tracking-tight bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent drop-shadow-sm pb-1">
        Whale of Fortune
      </h1>
      <p class="text-sm font-light text-base-content/70">Draft your destiny</p>
    </header>

    <!-- Controls Section -->
    <section class="flex flex-col gap-6 w-full">

      <!-- Team Selection -->
      <div class="form-control w-full">
        <label class="label pb-1 pt-0">
          <span class="label-text text-xs font-semibold uppercase tracking-wider text-base-content/60">Select
            Team</span>
        </label>
        <div class="relative">
          <select id="team-select"
            class="select select-bordered select-primary w-full bg-base-100/50 backdrop-blur-md shadow-lg shadow-primary/5 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium text-lg appearance-none bg-none h-14 pl-5 pr-10">
            <option value="townsfolk" selected>Townsfolk</option>
            <!-- Options will be dynamically populated -->
          </select>
          <!-- Custom dropdown arrow for elegance -->
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                clip-rule="evenodd" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Action Buttons (Dice) -->
      <div class="form-control w-full">
        <label class="label pb-1 pt-0">
          <span class="label-text text-xs font-semibold uppercase tracking-wider text-base-content/60">Draw Count</span>
        </label>
        <div class="grid grid-cols-3 gap-4">
          <!-- Button 3 -->
          <button id="btn-draw-3"
            class="btn btn-lg h-24 bg-base-100/60 hover:bg-accent hover:border-accent hover:text-accent-content backdrop-blur-md border-base-300 shadow-lg shadow-base-300/20 flex flex-col gap-2 transition-all duration-300 group rounded-2xl">
            <svg class="w-8 h-8 opacity-80 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="7.5" cy="7.5" r="1.5" fill="currentColor"></circle>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
              <circle cx="16.5" cy="16.5" r="1.5" fill="currentColor"></circle>
            </svg>
            <span class="text-sm font-bold">Three</span>
          </button>

          <!-- Button 2 -->
          <button id="btn-draw-2"
            class="btn btn-lg h-24 bg-base-100/60 hover:bg-secondary hover:border-secondary hover:text-secondary-content backdrop-blur-md border-base-300 shadow-lg shadow-base-300/20 flex flex-col gap-2 transition-all duration-300 group rounded-2xl">
            <svg class="w-8 h-8 opacity-80 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8" cy="8" r="1.5" fill="currentColor"></circle>
              <circle cx="16" cy="16" r="1.5" fill="currentColor"></circle>
            </svg>
            <span class="text-sm font-bold">Two</span>
          </button>

          <!-- Button 1 -->
          <button id="btn-draw-1"
            class="btn btn-lg h-24 bg-base-100/60 hover:bg-primary hover:border-primary hover:text-primary-content backdrop-blur-md border-base-300 shadow-lg shadow-base-300/20 flex flex-col gap-2 transition-all duration-300 group rounded-2xl">
            <svg class="w-8 h-8 opacity-80 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
            </svg>
            <span class="text-sm font-bold">One</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Divider -->
    <div class="divider before:bg-base-content/10 after:bg-base-content/10"></div>

    <!-- Results Section -->
    <section id="results" class="flex flex-col gap-4 w-full min-h-[500px] p-2 pb-4">
      <!-- Javascript will populate cards here -->

      <!-- Placeholder text before any interactions -->
      <div id="results-placeholder"
        class="flex flex-col items-center justify-start pt-8 h-full min-h-[10rem] opacity-40 text-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-base-content" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <p class="text-sm font-medium">Select a team and draw</p>
      </div>
    </section>

  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
